server:
  host: "0.0.0.0"
  port: 8080
  shutdown_timeout_secs: 30
  cors:
    allowed_origins:
      - "*"
    allowed_methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed_headers:
      - content-type
      - authorization
      - x-api-key
      - x-request-id

resources:
  max_daily_cost: 10.0
  max_daily_tokens: 1000000
  max_concurrent: 5
  provider_limits:
    opencode-zen:
      max_daily_cost: 5.0
      max_rpm: 60
      max_tpm: 500000
    openrouter:
      max_daily_cost: 5.0
      max_rpm: 60
      max_tpm: 500000

policies:
  - name: default
    priority: 1
    conditions: []
    actions:
      - action_type: set_strategy
        params:
          strategy: "auto"

strategies:
  consensus_count: 3

providers:
  zen:
    base_url: "https://api.opencode.ai/v1"
    api_key_env: "OPENCODEZEN_API_KEY"
  openrouter:
    base_url: "https://openrouter.ai/api/v1"
    api_key_env: "OPENROUTER_API_KEY"

auth:
  enabled: false
  api_keys: []

rate_limiting:
  requests_per_minute: 60
  burst_size: 10
  cleanup_interval_secs: 300

logging:
  format: "text"
  level: "info"
  directory: ""

tools:
  allowed_shell_commands:
    - ls
    - echo
    - cat
    - cmd
  shell_timeout_secs: 10
  allowed_read_directories:
    - "."
  enable_http_tool: true
